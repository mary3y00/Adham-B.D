<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Adham</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;800&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    height: 100vh;
    font-family: 'Poppins', sans-serif;
    background: radial-gradient(circle at top, #8989b1, #1b1b2f);
    color: white;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
}

/* particles */
body::before {
    content: "";
    position: absolute;
    width: 200%;
    height: 200%;
    background: radial-gradient(white 1px, transparent 1px);
    background-size: 40px 40px;
    animation: moveBg 25s linear infinite;
    opacity: 0.15;
}

@keyframes moveBg {
    from { transform: translate(0,0); }
    to { transform: translate(-200px, -200px); }
}

.container {
    width: 90%;
    max-width: 600px;
    z-index: 2;
}

/* balloons */
.balloons {
    font-size: 10vw;
    animation: float 3s ease-in-out infinite;
}

@keyframes float {
    0% { transform: translateY(0); }
    50% { transform: translateY(-20px); }
    100% { transform: translateY(0); }
}

/* name */
.name {
    font-size: 18vw;
    font-weight: 800;
    background: linear-gradient(45deg, #ff4e50, #f9d423, #24c6dc);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: glow 2s infinite alternate;
}

@keyframes glow {
    from { text-shadow: 0 0 10px #ff4e50; }
    to { text-shadow: 0 0 30px #24c6dc; }
}

h2 {
    font-size: 6vw;
    font-weight: 300;
    margin-top: 10px;
}

.message {
    font-size: 4.5vw;
    margin-top: 10px;
    opacity: 0.9;
    line-height: 1.5;
}

/* button */
button {
    margin-top: 20px;
    padding: 14px 20px;
    font-size: 4.5vw;
    border: none;
    border-radius: 30px;
    background: linear-gradient(45deg, #ff4e50, #f9d423);
    color: white;
    cursor: pointer;
    width: 80%;
    max-width: 300px;
}

button:active {
    transform: scale(0.95);
}

/* surprise */
#surprise {
    margin-top: 15px;
    font-size: 4.5vw;
    color: #f9d423;
    line-height: 1.6;
}
</style>
</head>

<body>

<div class="container">

    <div class="balloons">🎈🎈🎈</div>

    <h1 class="name">ADHAM</h1>

    <h2>Happy Birthday 🎂</h2>

    <p class="message">
        Wishing you a day full of happiness<br>
        and a life full of success and joy ✨
    </p>

    <button onclick="showSurprise()">Click for a Surprise 🎁</button>

    <div id="surprise"></div>

</div>

<script>
function showSurprise() {
    document.getElementById("surprise").innerHTML =
    "Adham 💖 you are amazing and deserve the best!<br><br>" +
    "Every moment with you is special ✨<br><br>" +
    "May all your dreams come true <br><br>" +
    "From your Wife ✨Maryam✨";
}
</script>

</body>
</html>
