<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Adham</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;800&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    padding: 0;
    font-family: 'Poppins', sans-serif;
    background: radial-gradient(circle at top, #8989b1, #4e4444);
    color: white;
    text-align: center;
    overflow: hidden;
}

/* particles */
body::before {
    content: "";
    position: absolute;
    width: 200%;
    height: 200%;
    background: radial-gradient(white 1px, transparent 1px);
    background-size: 40px 40px;
    animation: moveBg 20s linear infinite;
    opacity: 0.2;
}

@keyframes moveBg {
    from { transform: translate(0,0); }
    to { transform: translate(-200px, -200px); }
}

/* container mobile fix */
.container {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 90%;
    max-width: 500px;
}

/* name */
.name {
    font-size: 12vw;
    font-weight: 800;
    letter-spacing: 5px;
    background: linear-gradient(45deg, #403694, #f9d423, #24c6dc);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: glow 2s ease-in-out infinite alternate;
}

@keyframes glow {
    from { text-shadow: 0 0 10px #02152b; }
    to { text-shadow: 0 0 25px #24c6dc; }
}

h2 {
    font-weight: 300;
    font-size: 5vw;
}

.message {
    font-size: 4vw;
    margin-top: 10px;
    opacity: 0.85;
}

/* button */
button {
    margin-top: 25px;
    padding: 12px 20px;
    font-size: 4.5vw;
    border: none;
    border-radius: 30px;
    background: linear-gradient(45deg, #7316df, #f9d423);
    color: white;
    cursor: pointer;
    width: 80%;
    max-width: 280px;
}

/* surprise */
#surprise {
    margin-top: 20px;
    font-size: 4vw;
    color: #f9d423;
    line-height: 1.6;
    padding: 10px;
}

/* balloons */
.balloons {
    font-size: 10vw;
    animation: float 3s ease-in-out infinite;
}

@keyframes float {
    0% { transform: translateY(0); }
    50% { transform: translateY(-20px); }
    100% { transform: translateY(0); }
}
</style>
</head>

<body>

<div class="container">
    <div class="balloons">🎈🎈🎈</div>

    <h1 class="name">Adham</h1>

    <h2>Happy Birthday Adham 🎂</h2>

    <p class="message">
        Wishing you a day filled with happiness<br>
        and a year filled with success and joy ✨
    </p>

    <button onclick="showSurprise()">Click for a Surprise 🎁</button>

    <div id="surprise"></div>
</div>

<script>
function showSurprise() {
    document.getElementById("surprise").innerHTML =
    "Adham, you are amazing and deserve the best! 🌟<br><br>" +
    "Happy moments are sweeter because you’re in my life ✨<br><br>" +
    "May all your dreams come true💖<br><br>" +
    "From your Wife  ✨Maryam✨";
}
</script>

</body>
</html>
